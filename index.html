<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Барабан призів · Тестова сторінка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Manrope:wght@400;500;600;700&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
<style>
  :root{
    /* Фірмові кольори "Родинна ковбаска" (ТМ Barkom) — світлий стиль, зелений акцент */
    --green:#83C341; --green-d:#46AB54; --green-dd:#2F7D3A; --green-soft:#A6D96A;
    --ink:#212529; --muted:#515457;
    --bg:#FFFFFF; --bg-tint:#F1F8E9; --panel:#FFFFFF; --line:#E6EFE0;
    --cream:#F7FBEF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{
    font-family:'Manrope',system-ui,sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, var(--bg-tint) 0%, #FFFFFF 52%);
    background-attachment:fixed;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:18px 16px 48px;
    text-align:center;
    overflow-x:hidden;
  }
  .brand{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:6px}
  .brand img{height:78px;width:auto}
  .brand .slogan{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;
    letter-spacing:.22em;text-transform:uppercase;color:var(--green-d)}
  .demo-badge{
    font-family:'Manrope',sans-serif;font-weight:700;font-size:11px;letter-spacing:.16em;
    color:var(--green-d);text-transform:uppercase;
    border:1px solid var(--green);border-radius:999px;padding:6px 14px;margin-top:2px;
    background:#fff;
  }
  h1{
    font-family:'Nunito',sans-serif;font-weight:900;
    font-size:clamp(30px,8.5vw,46px);line-height:1.04;margin:14px 0 4px;color:var(--ink);
  }
  h1 .green{color:var(--green-d)}
  .phone-line{font-weight:600;font-size:clamp(15px,4.2vw,18px);color:var(--muted);margin-bottom:14px;letter-spacing:.01em}

  /* ---- WHEEL ---- */
  .stage{position:relative;width:min(86vw,420px);aspect-ratio:1/1;margin:6px auto 8px}
  .pointer{
    position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:6;
    width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;
    border-top:30px solid var(--green-d);
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.2));
  }
  .pointer::after{content:"";position:absolute;top:-30px;left:-6px;width:12px;height:12px;border-radius:50%;background:var(--green-soft)}
  .rim{
    position:absolute;inset:0;border-radius:50%;
    background:
      radial-gradient(circle at 50% 35%, var(--green-soft), var(--green) 55%, var(--green-d) 100%);
    box-shadow:0 14px 36px rgba(70,171,84,.28), inset 0 0 0 3px rgba(255,255,255,.35);
    padding:18px;
  }
  .lamps{position:absolute;inset:0;z-index:4;pointer-events:none}
  .lamp{position:absolute;width:11px;height:11px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff,#eafbe0 55%,#bfe89a);
    margin:-5.5px;box-shadow:0 0 6px rgba(255,255,255,.9);
    animation:blink 1.6s infinite}
  @keyframes blink{0%,100%{opacity:.45;transform:scale(.8)}50%{opacity:1;transform:scale(1.15);box-shadow:0 0 12px 2px rgba(255,255,255,.95)}}
  .wheel-wrap{position:absolute;inset:18px;border-radius:50%;overflow:hidden;background:#fff;
    box-shadow:inset 0 0 0 4px var(--green), inset 0 0 26px rgba(70,171,84,.18)}
  #wheel{width:100%;height:100%;display:block;
    transition:transform 5.5s cubic-bezier(.12,.65,.07,1)}
  .hub{
    position:absolute;top:50%;left:50%;width:24%;height:24%;transform:translate(-50%,-50%);
    border-radius:50%;z-index:5;
    background:radial-gradient(circle at 38% 35%,var(--green-soft),var(--green) 60%,var(--green-d) 100%);
    box-shadow:0 4px 12px rgba(47,125,58,.35), inset 0 0 0 3px rgba(255,255,255,.45);
    display:flex;align-items:center;justify-content:center;
  }
  .hub span{font-family:'Nunito',sans-serif;font-weight:800;color:#fff;
    font-size:clamp(11px,3.2vw,15px);letter-spacing:.04em}

  /* ---- BUTTON ---- */
  .btn{
    font-family:'Nunito',sans-serif;font-weight:800;font-size:clamp(16px,4.6vw,20px);
    color:#fff;border:none;cursor:pointer;
    padding:16px 40px;border-radius:999px;margin-top:10px;
    background:linear-gradient(180deg,var(--green-soft),var(--green) 55%,var(--green-d));
    box-shadow:0 8px 0 var(--green-dd), 0 12px 22px rgba(70,171,84,.32);
    transition:transform .08s ease, box-shadow .08s ease;
    letter-spacing:.01em;
  }
  .btn:active:not(:disabled){transform:translateY(6px);box-shadow:0 2px 0 var(--green-dd),0 6px 12px rgba(70,171,84,.3)}
  .btn:disabled{filter:grayscale(.5) brightness(.96);cursor:not-allowed;box-shadow:0 6px 0 #9bb589}

  /* ---- RESULT / MESSAGES ---- */
  .msg{max-width:440px;margin:18px auto 0;font-size:16px;line-height:1.5;min-height:24px;color:var(--ink)}
  .result-amount{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(40px,12vw,68px);
    color:var(--green-d);margin:6px 0;display:none}
  .result-amount.show{display:block;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
  .credit-note{font-weight:600;color:var(--muted)}
  .lose-text{font-family:'Nunito',sans-serif;font-weight:800;font-size:clamp(20px,6vw,30px);color:var(--green-d)}

  /* error / no-number block */
  .notice{max-width:460px;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;padding:22px 20px;margin-top:30px;box-shadow:0 10px 30px rgba(33,37,41,.06)}
  .notice h2{font-family:'Nunito',sans-serif;font-weight:800;font-size:22px;color:var(--green-d);margin:0 0 10px}
  .notice code{display:inline-block;background:var(--bg-tint);color:var(--green-dd);padding:6px 10px;border-radius:8px;
    font-size:13px;margin-top:8px;word-break:break-all}

  .hidden{display:none!important}

  /* confetti */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
  .conf{position:absolute;top:-14px;width:9px;height:14px;opacity:.95;will-change:transform}

  @media (prefers-reduced-motion:reduce){
    #wheel{transition:transform 1.2s ease-out}
    .lamp{animation:none;opacity:.9}
    .result-amount.show{animation:none}
  }
</style>
</head>
<body>
  <div class="demo-badge">Тестова сторінка · Демо для команди</div>
  <div class="brand">
    <img src="https://rodynna-kovbaska.ua/img/logo_vertical.png" alt="Родинна ковбаска"
         onerror="this.style.display='none'">
    <div class="slogan">Своє. Свіже.</div>
  </div>
  <h1>Барабан <span class="green">призів</span></h1>
  <div class="phone-line" id="phoneLine"></div>

  <!-- main game -->
  <div id="game" class="hidden">
    <div class="stage">
      <div class="pointer"></div>
      <div class="rim"></div>
      <div class="lamps" id="lamps"></div>
      <div class="wheel-wrap">
        <svg id="wheel" viewBox="0 0 400 400" aria-label="Колесо призів"></svg>
      </div>
      <div class="hub"><span>КРУТИ!</span></div>
    </div>
    <button id="spinBtn" class="btn">Крутити барабан</button>
    <div class="result-amount" id="amount"></div>
    <div class="msg" id="msg"></div>
  </div>

  <!-- no-number / used notice -->
  <div id="notice" class="notice hidden">
    <h2 id="noticeTitle"></h2>
    <div id="noticeBody"></div>
  </div>

  <div id="confetti"></div>

<script>
(function(){
  "use strict";

  // ---------- 1. PHONE FROM URL ----------
  // Номер передається у посиланні після "?". Беремо лише цифри,
  // тож працюють формати: ?380630401041 , ?t=380... , ?+38(063)...
  var rawQuery = decodeURIComponent(location.search.replace(/^\?/, ""));
  var digits = rawQuery.replace(/\D/g, "");

  // нормалізація до національного формату 0XXXXXXXXX (10 цифр)
  function normalize(d){
    if(!d) return null;
    if(d.length >= 12 && d.indexOf("380") === 0) d = d.slice(2);      // 380XXXXXXXXX -> 0XXXXXXXXX
    else if(d.length === 11 && d.indexOf("80") === 0) d = "0" + d.slice(2);
    else if(d.length === 9) d = "0" + d;                              // XXXXXXXXX -> 0XXXXXXXXX
    // якщо вже 0XXXXXXXXX (10) — лишаємо як є
    if(d.length > 10) d = d.slice(-10);
    return d;
  }
  function displayPhone(nat){
    // 0XX XXX XX XX -> +38 0XX XXX XX XX
    var m = nat.match(/^(0\d{2})(\d{3})(\d{2})(\d{2})$/);
    if(!m) return "+38 " + nat;
    return "+38 " + m[1] + " " + m[2] + " " + m[3] + " " + m[4];
  }

  var gameEl = document.getElementById("game");
  var noticeEl = document.getElementById("notice");
  var noticeTitle = document.getElementById("noticeTitle");
  var noticeBody = document.getElementById("noticeBody");
  var phoneLineEl = document.getElementById("phoneLine");

  function showNotice(title, htmlBody){
    gameEl.classList.add("hidden");
    noticeEl.classList.remove("hidden");
    noticeTitle.textContent = title;
    noticeBody.innerHTML = htmlBody;
  }

  if(digits.length < 9){
    showNotice("Номер не передано",
      "Щоб взяти участь, відкрийте посилання з вашим номером телефону після знака «?».<br>" +
      "Приклад правильного посилання:<br><code>" + location.origin + location.pathname + "?380630401041</code>");
    return;
  }

  var phone = normalize(digits);
  var phoneFull = "+38" + (phone ? phone.slice(1) : "");
  phoneLineEl.textContent = "Учасник: " + displayPhone(phone);

  // ---------- 2. REPEAT PARTICIPATION CHECK ----------
  var STORE_KEY = "baraban_used_numbers";
  function getUsed(){
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || "[]"); }
    catch(e){ return []; }
  }
  function markUsed(n){
    var arr = getUsed();
    if(arr.indexOf(n) === -1){ arr.push(n); localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }
  }

  if(getUsed().indexOf(phone) !== -1){
    showNotice("Цей номер уже брав участь",
      "Один номер — одна спроба.<br>Номер <b>" + displayPhone(phone) + "</b> вже використав свою спробу в барабані.");
    return;
  }

  // все добре — показуємо гру
  gameEl.classList.remove("hidden");

  // ---------- 3. WHEEL CONFIG ----------
  // 15 секторів: 10 грошових + 5 "наступного разу", чергуються
  var SECTORS = [
    {type:"win",  amount:10},
    {type:"lose"},
    {type:"win",  amount:100},
    {type:"win",  amount:20},
    {type:"lose"},
    {type:"win",  amount:200},
    {type:"win",  amount:50},
    {type:"lose"},
    {type:"win",  amount:300},
    {type:"win",  amount:150},
    {type:"lose"},
    {type:"win",  amount:400},
    {type:"win",  amount:250},
    {type:"lose"},
    {type:"win",  amount:500}
  ];
  var N = SECTORS.length;          // 15
  var SEG = 360 / N;               // 24°

  // ---------- build SVG wheel ----------
  var svg = document.getElementById("wheel");
  var SVGNS = "http://www.w3.org/2000/svg";
  var cx = 200, cy = 200, R = 200;
  // clock-angle (clockwise from top) -> point
  function pt(angDeg, r){
    var a = (angDeg) * Math.PI/180;
    return [cx + r*Math.sin(a), cy - r*Math.cos(a)];
  }
  SECTORS.forEach(function(s, i){
    var a0 = i*SEG, a1 = (i+1)*SEG, mid = a0 + SEG/2;
    var p0 = pt(a0, R), p1 = pt(a1, R);
    var path = document.createElementNS(SVGNS,"path");
    path.setAttribute("d", "M"+cx+" "+cy+" L"+p0[0].toFixed(2)+" "+p0[1].toFixed(2)+
      " A"+R+" "+R+" 0 0 1 "+p1[0].toFixed(2)+" "+p1[1].toFixed(2)+" Z");
    path.setAttribute("fill", s.type==="win" ? "#FFFFFF" : "#83C341");
    path.setAttribute("stroke", "#83C341");
    path.setAttribute("stroke-width","2");
    svg.appendChild(path);

    // label
    var lp = pt(mid, R*0.64);
    if(s.type==="win"){
      var t = document.createElementNS(SVGNS,"text");
      t.setAttribute("x", lp[0].toFixed(1)); t.setAttribute("y", lp[1].toFixed(1));
      t.setAttribute("fill","#2F7D3A");
      t.setAttribute("font-family","Nunito, sans-serif");
      t.setAttribute("font-weight","800");
      t.setAttribute("font-size","19");
      t.setAttribute("text-anchor","middle");
      t.setAttribute("dominant-baseline","central");
      t.setAttribute("transform","rotate("+mid.toFixed(2)+" "+lp[0].toFixed(1)+" "+lp[1].toFixed(1)+")");
      t.textContent = s.amount;
      svg.appendChild(t);
      var u = document.createElementNS(SVGNS,"text");
      var up = pt(mid, R*0.82);
      u.setAttribute("x", up[0].toFixed(1)); u.setAttribute("y", up[1].toFixed(1));
      u.setAttribute("fill","#7BB23F");
      u.setAttribute("font-family","Manrope, sans-serif");
      u.setAttribute("font-weight","700");
      u.setAttribute("font-size","11");
      u.setAttribute("text-anchor","middle");
      u.setAttribute("dominant-baseline","central");
      u.setAttribute("transform","rotate("+mid.toFixed(2)+" "+up[0].toFixed(1)+" "+up[1].toFixed(1)+")");
      u.textContent = "грн";
      svg.appendChild(u);
    } else {
      var star = document.createElementNS(SVGNS,"text");
      star.setAttribute("x", lp[0].toFixed(1)); star.setAttribute("y", lp[1].toFixed(1));
      star.setAttribute("fill","#FFFFFF");
      star.setAttribute("font-size","26");
      star.setAttribute("text-anchor","middle");
      star.setAttribute("dominant-baseline","central");
      star.setAttribute("transform","rotate("+mid.toFixed(2)+" "+lp[0].toFixed(1)+" "+lp[1].toFixed(1)+")");
      star.textContent = "★";
      svg.appendChild(star);
    }
  });

  // ---------- lamps ----------
  var lampsEl = document.getElementById("lamps");
  var LAMPS = 16;
  for(var k=0;k<LAMPS;k++){
    var ang = (k/LAMPS)*2*Math.PI;
    var lr = 50; // % radius along rim
    var lamp = document.createElement("div");
    lamp.className = "lamp";
    lamp.style.left = (50 + lr*Math.sin(ang)).toFixed(2) + "%";
    lamp.style.top  = (50 - lr*Math.cos(ang)).toFixed(2) + "%";
    lamp.style.animationDelay = (k*0.1).toFixed(2) + "s";
    lampsEl.appendChild(lamp);
  }

  // ---------- 4. RESULT BY WEIGHTS (before spin) ----------
  function pickResult(){
    // 30% програш, 70% виграш
    if(Math.random()*100 < 30){
      return {type:"lose"};
    }
    // ваги всередині виграшів (сума = 100)
    var winWeights = [
      {amount:10,  w:20},
      {amount:20,  w:17},
      {amount:50,  w:15},
      {amount:100, w:13},
      {amount:150, w:11},
      {amount:200, w:9},
      {amount:250, w:7},
      {amount:300, w:4},
      {amount:400, w:2.5},
      {amount:500, w:1.5}
    ];
    var total = winWeights.reduce(function(a,b){return a+b.w;},0);
    var r = Math.random()*total, acc = 0;
    for(var i=0;i<winWeights.length;i++){
      acc += winWeights[i].w;
      if(r <= acc) return {type:"win", amount:winWeights[i].amount};
    }
    return {type:"win", amount:winWeights[0].amount};
  }

  // знайти індекс сектора під результат
  function sectorIndexFor(res){
    var candidates = [];
    SECTORS.forEach(function(s,i){
      if(res.type==="lose" && s.type==="lose") candidates.push(i);
      if(res.type==="win" && s.type==="win" && s.amount===res.amount) candidates.push(i);
    });
    return candidates[Math.floor(Math.random()*candidates.length)];
  }

  // ---------- 6. CREDIT STUB ----------
  function creditPrize(phone, amount){
    // TODO: тут у майбутньому буде реальний виклик API нарахування
    // (наприклад, POST у CRM/лояльність з номером і сумою).
    console.log("[creditPrize] нарахування призу", {
      phone: phone,
      amount: amount,
      time: new Date().toISOString()
    });
  }

  // ---------- 5. SPIN ----------
  var wheel = svg;
  var btn = document.getElementById("spinBtn");
  var amountEl = document.getElementById("amount");
  var msgEl = document.getElementById("msg");
  var spinning = false;
  var currentRotation = 0;

  btn.addEventListener("click", function(){
    if(spinning) return;
    spinning = true;
    btn.disabled = true;

    var res = pickResult();                 // результат визначено ДО обертання
    var idx = sectorIndexFor(res);
    var centerAngle = idx*SEG + SEG/2;       // clock-angle центру сектора
    var jitter = (Math.random()*2 - 1) * (SEG/2 - 3); // зміщення в межах сектора
    var spins = 5 + Math.floor(Math.random()*3); // 5–7 повних обертів

    // докрутити так, щоб центр сектора став під вказівником (угорі = 0)
    var target = 360*spins - centerAngle - jitter;
    currentRotation += target;
    wheel.style.transform = "rotate(" + currentRotation + "deg)";

    var DURATION = 5500;
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches){
      DURATION = 1200;
    }

    setTimeout(function(){
      finish(res);
    }, DURATION + 120);
  });

  function finish(res){
    markUsed(phone);                         // номер записано як використаний
    btn.textContent = "Спробу використано";
    btn.disabled = true;

    if(res.type === "win"){
      creditPrize(phone, res.amount);        // заглушка нарахування — лише при виграші
      amountEl.textContent = res.amount + " грн";
      amountEl.classList.add("show");
      msgEl.innerHTML = '<span class="credit-note">Приз буде нараховано на номер ' +
        displayPhone(phone) + '</span>';
      launchConfetti();
    } else {
      msgEl.innerHTML = '<div class="lose-text">Пощастить наступного разу!</div>' +
        '<div style="margin-top:6px;color:var(--muted)">Дякуємо за участь.</div>';
    }
  }

  // ---------- confetti ----------
  function launchConfetti(){
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches) return;
    var box = document.getElementById("confetti");
    var colors = ["#83C341","#46AB54","#A6D96A","#FFFFFF","#2F7D3A"];
    for(var i=0;i<140;i++){
      (function(){
        var c = document.createElement("div");
        c.className = "conf";
        var left = Math.random()*100;
        c.style.left = left + "vw";
        c.style.background = colors[Math.floor(Math.random()*colors.length)];
        c.style.transform = "rotate("+(Math.random()*360)+"deg)";
        if(Math.random()<0.5) c.style.borderRadius = "50%";
        box.appendChild(c);
        var dur = 2200 + Math.random()*2200;
        var xEnd = (Math.random()*2-1)*120;
        var anim = c.animate([
          {transform:"translate(0,0) rotate(0deg)", opacity:1},
          {transform:"translate("+xEnd+"px,"+(window.innerHeight+60)+"px) rotate("+(Math.random()*720)+"deg)", opacity:.9}
        ], {duration:dur, easing:"cubic-bezier(.2,.6,.4,1)"});
        anim.onfinish = function(){ c.remove(); };
      })();
    }
  }

})();
</script>
</body>
</html>
