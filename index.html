<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Барабан призів · Тестова сторінка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Manrope:wght@400;500;600;700&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
<style>
  :root{
    /* Фірмові кольори "Родинна ковбаска" (ТМ Barkom) — світлий стиль, зелений акцент */
    --green:#83C341; --green-d:#46AB54; --green-dd:#2F7D3A; --green-soft:#A6D96A;
    --ink:#212529; --muted:#515457;
    --bg:#FFFFFF; --bg-tint:#F1F8E9; --panel:#FFFFFF; --line:#E6EFE0;
    --cream:#F7FBEF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{
    font-family:'Manrope',system-ui,sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, var(--bg-tint) 0%, #FFFFFF 52%);
    background-attachment:fixed;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:18px 16px 48px;
    text-align:center;
    overflow-x:hidden;
  }
  .brand{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:6px}
  .brand img{height:78px;width:auto}
  .brand .slogan{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;
    letter-spacing:.22em;text-transform:uppercase;color:var(--green-d)}
  .demo-badge{
    font-family:'Manrope',sans-serif;font-weight:700;font-size:11px;letter-spacing:.16em;
    color:var(--green-d);text-transform:uppercase;
    border:1px solid var(--green);border-radius:999px;padding:6px 14px;margin-top:2px;
    background:#fff;
  }
  h1{
    font-family:'Nunito',sans-serif;font-weight:900;
    font-size:clamp(30px,8.5vw,46px);line-height:1.04;margin:14px 0 4px;color:var(--ink);
  }
  h1 .green{color:var(--green-d)}
  .phone-line{font-weight:600;font-size:clamp(15px,4.2vw,18px);color:var(--muted);margin-bottom:14px;letter-spacing:.01em}
  .loader{margin-top:30px;color:var(--muted);font-weight:600;font-size:16px}
  .loader .dot{display:inline-block;animation:blink 1.2s infinite}

  /* ---- WHEEL ---- */
  .stage{position:relative;width:min(86vw,420px);aspect-ratio:1/1;margin:6px auto 8px}
  .pointer{
    position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:6;
    width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;
    border-top:30px solid var(--green-d);
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.2));
  }
  .pointer::after{content:"";position:absolute;top:-30px;left:-6px;width:12px;height:12px;border-radius:50%;background:var(--green-soft)}
  .rim{
    position:absolute;inset:0;border-radius:50%;
    background:
      radial-gradient(circle at 50% 35%, var(--green-soft), var(--green) 55%, var(--green-d) 100%);
    box-shadow:0 14px 36px rgba(70,171,84,.28), inset 0 0 0 3px rgba(255,255,255,.35);
    padding:18px;
  }
  .lamps{position:absolute;inset:0;z-index:4;pointer-events:none}
  .lamp{position:absolute;width:11px;height:11px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff,#eafbe0 55%,#bfe89a);
    margin:-5.5px;box-shadow:0 0 6px rgba(255,255,255,.9);
    animation:blink 1.6s infinite}
  @keyframes blink{0%,100%{opacity:.45;transform:scale(.8)}50%{opacity:1;transform:scale(1.15);box-shadow:0 0 12px 2px rgba(255,255,255,.95)}}
  .wheel-wrap{position:absolute;inset:18px;border-radius:50%;overflow:hidden;background:#fff;
    box-shadow:inset 0 0 0 4px var(--green), inset 0 0 26px rgba(70,171,84,.18)}
  #wheel{width:100%;height:100%;display:block;
    transition:transform 5.5s cubic-bezier(.12,.65,.07,1)}
  .hub{
    position:absolute;top:50%;left:50%;width:24%;height:24%;transform:translate(-50%,-50%);
    border-radius:50%;z-index:5;
    background:radial-gradient(circle at 38% 35%,var(--green-soft),var(--green) 60%,var(--green-d) 100%);
    box-shadow:0 4px 12px rgba(47,125,58,.35), inset 0 0 0 3px rgba(255,255,255,.45);
    display:flex;align-items:center;justify-content:center;
  }
  .hub span{font-family:'Nunito',sans-serif;font-weight:800;color:#fff;
    font-size:clamp(11px,3.2vw,15px);letter-spacing:.04em}

  /* ---- BUTTON ---- */
  .btn{
    font-family:'Nunito',sans-serif;font-weight:800;font-size:clamp(16px,4.6vw,20px);
    color:#fff;border:none;cursor:pointer;
    padding:16px 40px;border-radius:999px;margin-top:10px;
    background:linear-gradient(180deg,var(--green-soft),var(--green) 55%,var(--green-d));
    box-shadow:0 8px 0 var(--green-dd), 0 12px 22px rgba(70,171,84,.32);
    transition:transform .08s ease, box-shadow .08s ease;
    letter-spacing:.01em;
  }
  .btn:active:not(:disabled){transform:translateY(6px);box-shadow:0 2px 0 var(--green-dd),0 6px 12px rgba(70,171,84,.3)}
  .btn:disabled{filter:grayscale(.5) brightness(.96);cursor:not-allowed;box-shadow:0 6px 0 #9bb589}

  /* ---- RESULT / MESSAGES ---- */
  .msg{max-width:440px;margin:18px auto 0;font-size:16px;line-height:1.5;min-height:24px;color:var(--ink)}
  .result-amount{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(40px,12vw,68px);
    color:var(--green-d);margin:6px 0;display:none}
  .result-amount.show{display:block;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
  .credit-note{font-weight:600;color:var(--muted)}
  .lose-text{font-family:'Nunito',sans-serif;font-weight:800;font-size:clamp(20px,6vw,30px);color:var(--green-d)}

  /* error / no-number block */
  .notice{max-width:460px;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;padding:22px 20px;margin-top:30px;box-shadow:0 10px 30px rgba(33,37,41,.06)}
  .notice h2{font-family:'Nunito',sans-serif;font-weight:800;font-size:22px;color:var(--green-d);margin:0 0 10px}
  .notice code{display:inline-block;background:var(--bg-tint);color:var(--green-dd);padding:6px 10px;border-radius:8px;
    font-size:13px;margin-top:8px;word-break:break-all}

  .hidden{display:none!important}

  /* confetti */
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
  .conf{position:absolute;top:-14px;width:9px;height:14px;opacity:.95;will-change:transform}

  @media (prefers-reduced-motion:reduce){
    #wheel{transition:transform 1.2s ease-out}
    .lamp{animation:none;opacity:.9}
    .result-amount.show{animation:none}
  }
</style>
</head>
<body>
  <div class="demo-badge">Тестова сторінка · Демо для команди</div>
  <div class="brand">
    <img src="https://rodynna-kovbaska.ua/img/logo_vertical.png" alt="Родинна ковбаска"
         onerror="this.style.display='none'">
    <div class="slogan">Своє. Свіже.</div>
  </div>
  <h1>Барабан <span class="green">призів</span></h1>
  <div class="phone-line" id="phoneLine"></div>

  <div id="loader" class="loader hidden">Перевіряємо ваш номер<span class="dot">…</span></div>

  <!-- main game -->
  <div id="game" class="hidden">
    <div class="stage">
      <div class="pointer"></div>
      <div class="rim"></div>
      <div class="lamps" id="lamps"></div>
      <div class="wheel-wrap">
        <svg id="wheel" viewBox="0 0 400 400" aria-label="Колесо призів"></svg>
      </div>
      <div class="hub"><span>КРУТИ!</span></div>
    </div>
    <button id="spinBtn" class="btn">Крутити барабан</button>
    <div class="result-amount" id="amount"></div>
    <div class="msg" id="msg"></div>
  </div>

  <!-- notice (no number / used / errors) -->
  <div id="notice" class="notice hidden">
    <h2 id="noticeTitle"></h2>
    <div id="noticeBody"></div>
  </div>

  <div id="confetti"></div>

<script>
(function(){
  "use strict";

  // =========================================================================
  //  КОНФІГУРАЦІЯ
  //  Встав сюди URL веб-додатка Google Apps Script (…/exec).
  //  Поки порожньо ('') — сторінка працює в ДЕМО-режимі (без бекенду й нарахувань).
  // =========================================================================
  var API = 'https://script.google.com/macros/s/AKfycbxy0-6gkcglXT6KK9lRAj1j0j0csZvmhwrvtX-NolCsoCxmA6xtVxyVpJWc58AzCOnO1A/exec';
  var PERIOD = 7; // днів (для тексту повідомлення)

  // Сектори колеса — МАЮТЬ збігатися з масивом SECTORS у baraban-apps-script.gs
  var SECTORS = [
    {type:"win",  amount:10},
    {type:"lose"},
    {type:"win",  amount:100},
    {type:"win",  amount:20},
    {type:"lose"},
    {type:"win",  amount:200},
    {type:"win",  amount:50},
    {type:"lose"},
    {type:"win",  amount:300},
    {type:"win",  amount:150},
    {type:"lose"},
    {type:"win",  amount:400},
    {type:"win",  amount:250},
    {type:"lose"},
    {type:"win",  amount:500}
  ];
  var N = SECTORS.length, SEG = 360 / N;

  // ---------- елементи ----------
  var gameEl    = document.getElementById("game");
  var noticeEl  = document.getElementById("notice");
  var noticeTit = document.getElementById("noticeTitle");
  var noticeBody= document.getElementById("noticeBody");
  var phoneLine = document.getElementById("phoneLine");
  var loaderEl  = document.getElementById("loader");
  var btn       = document.getElementById("spinBtn");
  var amountEl  = document.getElementById("amount");
  var msgEl     = document.getElementById("msg");
  var svg       = document.getElementById("wheel");

  function showNotice(t, html){
    gameEl.classList.add("hidden"); loaderEl.classList.add("hidden");
    noticeEl.classList.remove("hidden");
    noticeTit.textContent = t; noticeBody.innerHTML = html;
  }
  function showGame(){ noticeEl.classList.add("hidden"); loaderEl.classList.add("hidden"); gameEl.classList.remove("hidden"); }
  function showLoader(){ noticeEl.classList.add("hidden"); gameEl.classList.add("hidden"); loaderEl.classList.remove("hidden"); }

  // ---------- телефон з URL ----------
  var rawQuery = decodeURIComponent(location.search.replace(/^\?/, ""));
  var digits = rawQuery.replace(/\D/g, "");
  function normalize(d){
    if(!d) return null;
    if(d.length >= 12 && d.indexOf("380") === 0) d = d.slice(2);
    else if(d.length === 11 && d.indexOf("80") === 0) d = "0" + d.slice(2);
    else if(d.length === 9) d = "0" + d;
    if(d.length > 10) d = d.slice(-10);
    return d;
  }
  function displayPhone(nat){
    var m = nat && nat.match(/^(0\d{2})(\d{3})(\d{2})(\d{2})$/);
    if(!m) return "+38 " + (nat||"");
    return "+38 " + m[1] + " " + m[2] + " " + m[3] + " " + m[4];
  }

  if(digits.length < 9){
    showNotice("Номер не передано",
      "Щоб взяти участь, відкрийте посилання з вашим номером телефону після знака «?».<br>" +
      "Приклад правильного посилання:<br><code>" + location.origin + location.pathname + "?380630401041</code>");
    return;
  }
  var phone = normalize(digits);
  phoneLine.textContent = "Учасник: " + displayPhone(phone);

  // ---------- малюємо колесо (спільне для обох режимів) ----------
  buildWheel();

  // ---------- старт: реальний бекенд або демо ----------
  if(API){ startReal(); } else { startDemo(); }

  // =========================================================================
  //  РЕАЛЬНИЙ РЕЖИМ (Google Apps Script + таблиця)
  // =========================================================================
  function jsonp(params){
    return new Promise(function(resolve, reject){
      var cb = "cb_" + Math.random().toString(36).slice(2);
      var s = document.createElement("script");
      var done = false;
      window[cb] = function(data){ done = true; cleanup(); resolve(data); };
      function cleanup(){ try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); clearTimeout(timer); }
      var timer = setTimeout(function(){ if(!done){ cleanup(); reject(new Error("timeout")); } }, 15000);
      s.onerror = function(){ if(!done){ cleanup(); reject(new Error("network")); } };
      s.src = API + (API.indexOf("?")>=0?"&":"?") + params + "&callback=" + cb;
      document.body.appendChild(s);
    });
  }

  function startReal(){
    showLoader();
    jsonp("action=check&phone=" + encodeURIComponent(digits))
      .then(handleState)
      .catch(function(){ showNotice("Сервіс тимчасово недоступний", "Спробуйте, будь ласка, оновити сторінку трохи пізніше."); });
  }

  function handleState(r){
    if(!r){ return showNotice("Помилка", "Не вдалося отримати відповідь сервера."); }
    if(r.status === "ready"){ showGame(); bindRealSpin(); return; }
    if(r.status === "used")  return noticeUsed();
    if(r.status === "no_number") return noticeNoNumber();
    if(r.status === "bad_phone") return showNotice("Номер не передано","Перевірте посилання — у ньому має бути ваш номер після «?».");
    return showNotice("Помилка", "Сервіс повернув несподівану відповідь. Спробуйте пізніше.");
  }

  function bindRealSpin(){
    var spinning = false;
    btn.addEventListener("click", function(){
      if(spinning) return; spinning = true; btn.disabled = true;
      var prevText = btn.textContent; btn.textContent = "Крутимо…";
      jsonp("action=spin&phone=" + encodeURIComponent(digits))
        .then(function(r){
          if(r.status === "used"){ return noticeUsed(); }
          if(r.status === "no_number"){ return noticeNoNumber(); }
          if(r.status !== "win" && r.status !== "lose"){
            spinning = false; btn.disabled = false; btn.textContent = prevText;
            msgEl.textContent = "Не вдалося прокрутити. Спробуйте ще раз.";
            return;
          }
          animateTo(r.sectorIndex, function(){
            btn.textContent = "Спробу використано";
            if(r.status === "win"){
              amountEl.textContent = r.amount + " грн";
              amountEl.classList.add("show");
              var note = r.credited === false
                ? "Приз " + r.amount + " грн зараховуємо на номер " + displayPhone(phone) + " (обробляється)."
                : "Приз " + r.amount + " грн нараховано на номер " + displayPhone(phone) + " — діє " + PERIOD + " днів.";
              msgEl.innerHTML = '<span class="credit-note">' + note + '</span>';
              launchConfetti();
            } else {
              msgEl.innerHTML = '<div class="lose-text">Пощастить наступного разу!</div>' +
                '<div style="margin-top:6px;color:var(--muted)">Дякуємо за участь.</div>';
            }
          });
        })
        .catch(function(){
          spinning = false; btn.disabled = false; btn.textContent = prevText;
          msgEl.textContent = "Зʼєднання перервалося. Спробуйте ще раз.";
        });
    });
  }

  function noticeUsed(){
    showNotice("Цей номер уже брав участь",
      "Один номер — одна спроба.<br>Номер <b>" + displayPhone(phone) + "</b> вже використав свою спробу в барабані.");
  }
  function noticeNoNumber(){
    showNotice("Номер не зареєстрований",
      "Номер <b>" + displayPhone(phone) + "</b> не знайдено в системі лояльності «Родинна ковбаска».<br>" +
      "Зареєструйтеся в програмі лояльності та спробуйте ще раз.");
  }

  // =========================================================================
  //  ДЕМО-РЕЖИМ (без бекенду) — щоб лінк працював, поки API не підключено
  // =========================================================================
  function startDemo(){
    var STORE_KEY = "baraban_used_numbers";
    function getUsed(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||"[]"); }catch(e){ return []; } }
    function markUsed(n){ var a=getUsed(); if(a.indexOf(n)===-1){ a.push(n); localStorage.setItem(STORE_KEY, JSON.stringify(a)); } }
    if(getUsed().indexOf(phone) !== -1){ return noticeUsed(); }
    showGame();
    var spinning = false, currentRotation = 0;
    btn.addEventListener("click", function(){
      if(spinning) return; spinning = true; btn.disabled = true;
      var res = pickResultLocal();
      var idx = sectorIndexFor(res);
      animateTo(idx, function(){
        markUsed(phone);
        btn.textContent = "Спробу використано";
        if(res.type === "win"){
          console.log("[DEMO creditPrize]", {phone:phone, amount:res.amount, period:PERIOD, time:new Date().toISOString()});
          amountEl.textContent = res.amount + " грн"; amountEl.classList.add("show");
          msgEl.innerHTML = '<span class="credit-note">Демо: приз ' + res.amount + ' грн нараховано на номер ' +
            displayPhone(phone) + ' — діє ' + PERIOD + ' днів.</span>';
          launchConfetti();
        } else {
          msgEl.innerHTML = '<div class="lose-text">Пощастить наступного разу!</div>' +
            '<div style="margin-top:6px;color:var(--muted)">Дякуємо за участь.</div>';
        }
      });
    });
  }
  function pickResultLocal(){
    if(Math.random()*100 < 30) return {type:"lose"};
    var w = [{amount:10,w:20},{amount:20,w:17},{amount:50,w:15},{amount:100,w:13},{amount:150,w:11},
             {amount:200,w:9},{amount:250,w:7},{amount:300,w:4},{amount:400,w:2.5},{amount:500,w:1.5}];
    var total=w.reduce(function(a,b){return a+b.w;},0), r=Math.random()*total, acc=0;
    for(var i=0;i<w.length;i++){ acc+=w[i].w; if(r<=acc) return {type:"win",amount:w[i].amount}; }
    return {type:"win",amount:w[0].amount};
  }

  // =========================================================================
  //  СПІЛЬНЕ: колесо, обертання, конфеті
  // =========================================================================
  function sectorIndexFor(res){
    var c=[];
    SECTORS.forEach(function(s,i){
      if(res.type==="lose" && s.type==="lose") c.push(i);
      if(res.type==="win" && s.type==="win" && s.amount===res.amount) c.push(i);
    });
    return c[Math.floor(Math.random()*c.length)];
  }

  var _rotation = 0;
  function animateTo(sectorIndex, onDone){
    var centerAngle = sectorIndex*SEG + SEG/2;
    var jitter = (Math.random()*2 - 1) * (SEG/2 - 3);
    var spins = 5 + Math.floor(Math.random()*3);
    _rotation += 360*spins - centerAngle - jitter;
    svg.style.transform = "rotate(" + _rotation + "deg)";
    var dur = 5500;
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches) dur = 1200;
    setTimeout(onDone, dur + 120);
  }

  function buildWheel(){
    var SVGNS="http://www.w3.org/2000/svg", cx=200, cy=200, R=200;
    function pt(a,r){ var x=a*Math.PI/180; return [cx+r*Math.sin(x), cy-r*Math.cos(x)]; }
    SECTORS.forEach(function(s,i){
      var a0=i*SEG, a1=(i+1)*SEG, mid=a0+SEG/2, p0=pt(a0,R), p1=pt(a1,R);
      var path=document.createElementNS(SVGNS,"path");
      path.setAttribute("d","M"+cx+" "+cy+" L"+p0[0].toFixed(2)+" "+p0[1].toFixed(2)+
        " A"+R+" "+R+" 0 0 1 "+p1[0].toFixed(2)+" "+p1[1].toFixed(2)+" Z");
      path.setAttribute("fill", s.type==="win" ? "#FFFFFF" : "#83C341");
      path.setAttribute("stroke","#83C341"); path.setAttribute("stroke-width","2");
      svg.appendChild(path);
      var lp=pt(mid,R*0.64);
      if(s.type==="win"){
        addText(lp,mid,"#2F7D3A","Nunito, sans-serif","800","19",s.amount);
        addText(pt(mid,R*0.82),mid,"#7BB23F","Manrope, sans-serif","700","11","грн");
      } else {
        addText(lp,mid,"#FFFFFF","sans-serif","700","26","★");
      }
      function addText(p,deg,fill,fam,wt,sz,txt){
        var t=document.createElementNS(SVGNS,"text");
        t.setAttribute("x",p[0].toFixed(1)); t.setAttribute("y",p[1].toFixed(1));
        t.setAttribute("fill",fill); t.setAttribute("font-family",fam); t.setAttribute("font-weight",wt);
        t.setAttribute("font-size",sz); t.setAttribute("text-anchor","middle"); t.setAttribute("dominant-baseline","central");
        t.setAttribute("transform","rotate("+deg.toFixed(2)+" "+p[0].toFixed(1)+" "+p[1].toFixed(1)+")");
        t.textContent=txt; svg.appendChild(t);
      }
    });
    var lampsEl=document.getElementById("lamps");
    for(var k=0;k<16;k++){
      var ang=(k/16)*2*Math.PI, lamp=document.createElement("div"); lamp.className="lamp";
      lamp.style.left=(50+50*Math.sin(ang)).toFixed(2)+"%";
      lamp.style.top =(50-50*Math.cos(ang)).toFixed(2)+"%";
      lamp.style.animationDelay=(k*0.1).toFixed(2)+"s";
      lampsEl.appendChild(lamp);
    }
  }

  function launchConfetti(){
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches) return;
    var box=document.getElementById("confetti");
    var colors=["#83C341","#46AB54","#A6D96A","#FFFFFF","#2F7D3A"];
    for(var i=0;i<140;i++){ (function(){
      var c=document.createElement("div"); c.className="conf";
      c.style.left=(Math.random()*100)+"vw";
      c.style.background=colors[Math.floor(Math.random()*colors.length)];
      c.style.transform="rotate("+(Math.random()*360)+"deg)";
      if(Math.random()<0.5) c.style.borderRadius="50%";
      box.appendChild(c);
      var dur=2200+Math.random()*2200, xEnd=(Math.random()*2-1)*120;
      c.animate([{transform:"translate(0,0) rotate(0deg)",opacity:1},
        {transform:"translate("+xEnd+"px,"+(window.innerHeight+60)+"px) rotate("+(Math.random()*720)+"deg)",opacity:.9}],
        {duration:dur,easing:"cubic-bezier(.2,.6,.4,1)"}).onfinish=function(){ c.remove(); };
    })(); }
  }

})();
</script>
</body>
